<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sudoku Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
    }

    td {
      border: 1px solid #555;
      width: 40px;
      height: 40px;
      text-align: center;
    }

    input {
      width: 38px;
      height: 38px;
      text-align: center;
      font-size: 18px;
      border: none;
      outline: none;
    }

    .fixed {
      background-color: #e0e0e0;
      font-weight: bold;
    }

    /* Thick borders for 3x3 boxes */
    tr:nth-child(3n) td {
      border-bottom: 2px solid black;
    }
    td:nth-child(3n) {
      border-right: 2px solid black;
    }
    tr:first-child td {
      border-top: 2px solid black;
    }
    td:first-child {
      border-left: 2px solid black;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>Sudoku Game</h1>

<table id="sudoku"></table>

<button onclick="checkSolution()">Check Solution</button>
<div id="result"></div>

<script>
  const puzzle = [
    [5,3,"", "",7,"", "", "", ""],
    [6,"","", 1,9,5, "", "", ""],
    ["",9,8, "", "", "", "",6,""],

    [8,"","", "",6,"", "", "",3],
    [4,"","", 8,"",3, "", "",1],
    [7,"","", "",2,"", "", "",6],

    ["",6,"", "", "", "", 2,8,""],
    ["","", "", 4,1,9, "", "",5],
    ["","", "", "",8,"", "",7,9]
  ];

  const solution = [
    [5,3,4,6,7,8,9,1,2],
    [6,7,2,1,9,5,3,4,8],
    [1,9,8,3,4,2,5,6,7],

    [8,5,9,7,6,1,4,2,3],
    [4,2,6,8,5,3,7,9,1],
    [7,1,3,9,2,4,8,5,6],

    [9,6,1,5,3,7,2,8,4],
    [2,8,7,4,1,9,6,3,5],
    [3,4,5,2,8,6,1,7,9]
  ];

  const table = document.getElementById("sudoku");

  function createGrid() {
    for (let i = 0; i < 9; i++) {
      const row = document.createElement("tr");
      for (let j = 0; j < 9; j++) {
        const cell = document.createElement("td");
        const input = document.createElement("input");

        if (puzzle[i][j] !== "") {
          input.value = puzzle[i][j];
          input.disabled = true;
          input.classList.add("fixed");
        }

        input.maxLength = 1;
        input.oninput = () => {
          input.value = input.value.replace(/[^1-9]/g, "");
        };

        cell.appendChild(input);
        row.appendChild(cell);
      }
      table.appendChild(row);
    }
  }

  function checkSolution() {
    const inputs = document.querySelectorAll("input");
    let index = 0;
    let correct = true;

    for (let i = 0; i < 9; i++) {
      for (let j = 0; j < 9; j++) {
        const value = inputs[index].value;
        if (value == "" || parseInt(value) !== solution[i][j]) {
          correct = false;
        }
        index++;
      }
    }

    document.getElementById("result").innerText =
      correct ? "🎉 Correct Solution!" : "❌ Wrong Solution. Try again!";
  }

  createGrid();
</script>

</body>
</html>
