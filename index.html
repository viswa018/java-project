<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Racing Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    #gameArea {
      position: relative;
      width: 300px;
      height: 500px;
      background: #555;
      overflow: hidden;
      border: 3px solid white;
    }

    /* Player car */
    #playerCar {
      position: absolute;
      width: 50px;
      height: 90px;
      bottom: 10px;
      left: 125px;
      background-image: url("https://i.imgur.com/6QKQ5QF.png");
      background-size: cover;
      background-position: center;
    }

    /* Enemy cars */
    .enemyCar {
      position: absolute;
      width: 50px;
      height: 90px;
      top: -100px;
      background-image: url("https://i.imgur.com/Z6x8Y0y.png");
      background-size: cover;
      background-position: center;
    }

    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="gameArea">
    <div id="score">Score: 0</div>
    <div id="playerCar"></div>
  </div>

  <script>
    const playerCar = document.getElementById("playerCar");
    const gameArea = document.getElementById("gameArea");
    const scoreText = document.getElementById("score");

    let carX = 125;
    let score = 0;
    let gameOver = false;

    // Move car left & right
    document.addEventListener("keydown", (e) => {
      if (gameOver) return;

      if (e.key === "ArrowLeft" && carX > 0) {
        carX -= 50;
      }
      if (e.key === "ArrowRight" && carX < 250) {
        carX += 50;
      }
      playerCar.style.left = carX + "px";
    });

    // Create enemy cars
    function createEnemyCar() {
      if (gameOver) return;

      const enemy = document.createElement("div");
      enemy.classList.add("enemyCar");
      enemy.style.left = Math.floor(Math.random() * 6) * 50 + "px";
      gameArea.appendChild(enemy);

      let enemyY = -100;

      const moveEnemy = setInterval(() => {
        if (gameOver) {
          clearInterval(moveEnemy);
          return;
        }

        enemyY += 5;
        enemy.style.top = enemyY + "px";

        // Collision detection
        if (
          enemyY > 340 &&
          enemyY < 430 &&
          enemy.style.left === playerCar.style.left
        ) {
          gameOver = true;
          alert("💥 Game Over!\nScore: " + score);
          location.reload();
        }

        // Enemy passed
        if (enemyY > 500) {
          clearInterval(moveEnemy);
          enemy.remove();
          score++;
          scoreText.innerText = "Score: " + score;
        }
      }, 20);
    }

    setInterval(createEnemyCar, 1500);
  </script>

</body>
</html>
