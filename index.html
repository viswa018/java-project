<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enhanced Sudoku Game</title>

<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background: #f4f6fb;
    display: flex;
    justify-content: center;
    margin-top: 30px;
  }

  .container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
  }

  h1 {
    margin-bottom: 10px;
  }

  .info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    font-weight: bold;
  }

  table {
    border-collapse: collapse;
    margin: auto;
  }

  td {
    border: 1px solid #888;
    width: 40px;
    height: 40px;
  }

  input {
    width: 100%;
    height: 100%;
    border: none;
    text-align: center;
    font-size: 18px;
    outline: none;
  }

  .fixed {
    background: #e3e7f0;
    font-weight: bold;
  }

  .wrong {
    background: #ffcccc;
  }

  tr:nth-child(3n) td {
    border-bottom: 2px solid black;
  }
  td:nth-child(3n) {
    border-right: 2px solid black;
  }
  tr:first-child td {
    border-top: 2px solid black;
  }
  td:first-child {
    border-left: 2px solid black;
  }

  button {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: #4a6cf7;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  button:hover {
    background: #3957d6;
  }

  #result {
    margin-top: 10px;
    font-size: 18px;
  }

  @media (max-width: 480px) {
    td { width: 35px; height: 35px; }
  }
</style>
</head>

<body>

<div class="container">
  <h1>🧩 Sudoku</h1>

  <div class="info">
    <span>⏱ Time: <span id="timer">00:00</span></span>
    <span>Difficulty: Easy</span>
  </div>

  <table id="sudoku"></table>

  <button onclick="checkSolution()">Check Solution</button>
  <button onclick="restartGame()">🔄 New Game</button>

  <div id="result"></div>
</div>

<script>
const puzzles = [
  {
    puzzle: [
      [5,3,"","",7,"","","",""],
      [6,"","",1,9,5,"","",""],
      ["",9,8,"","","","",6,""],
      [8,"","", "",6,"", "", "",3],
      [4,"","",8,"",3,"","",1],
      [7,"","", "",2,"", "", "",6],
      ["",6,"","", "", "",2,8,""],
      ["","", "",4,1,9,"","",5],
      ["","", "", "",8,"", "",7,9]
    ],
    solution: [
      [5,3,4,6,7,8,9,1,2],
      [6,7,2,1,9,5,3,4,8],
      [1,9,8,3,4,2,5,6,7],
      [8,5,9,7,6,1,4,2,3],
      [4,2,6,8,5,3,7,9,1],
      [7,1,3,9,2,4,8,5,6],
      [9,6,1,5,3,7,2,8,4],
      [2,8,7,4,1,9,6,3,5],
      [3,4,5,2,8,6,1,7,9]
    ]
  }
];

let puzzle, solution;
let timerInterval, seconds = 0;
const table = document.getElementById("sudoku");

function startTimer() {
  clearInterval(timerInterval);
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    const min = String(Math.floor(seconds / 60)).padStart(2,"0");
    const sec = String(seconds % 60).padStart(2,"0");
    document.getElementById("timer").innerText = `${min}:${sec}`;
  },1000);
}

function createGrid() {
  table.innerHTML = "";
  for (let i=0;i<9;i++) {
    const row = document.createElement("tr");
    for (let j=0;j<9;j++) {
      const cell = document.createElement("td");
      const input = document.createElement("input");

      if (puzzle[i][j] !== "") {
        input.value = puzzle[i][j];
        input.disabled = true;
        input.classList.add("fixed");
      }

      input.maxLength = 1;
      input.oninput = () => {
        input.value = input.value.replace(/[^1-9]/g,"");
        validateCell(input,i,j);
      };

      cell.appendChild(input);
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
}

function validateCell(input,i,j) {
  if (input.value && parseInt(input.value) !== solution[i][j]) {
    input.classList.add("wrong");
  } else {
    input.classList.remove("wrong");
  }
}

function checkSolution() {
  const inputs = document.querySelectorAll("input");
  let index = 0;
  let correct = true;

  for (let i=0;i<9;i++) {
    for (let j=0;j<9;j++) {
      if (inputs[index].value == "" ||
          parseInt(inputs[index].value) !== solution[i][j]) {
        correct = false;
      }
      index++;
    }
  }

  if (correct) {
    clearInterval(timerInterval);
    document.getElementById("result").innerText =
      "🎉 Puzzle Solved!";
    inputs.forEach(i => i.disabled = true);
  } else {
    document.getElementById("result").innerText =
      "❌ Still some mistakes!";
  }
}

function restartGame() {
  const game = puzzles[Math.floor(Math.random()*puzzles.length)];
  puzzle = game.puzzle;
  solution = game.solution;
  document.getElementById("result").innerText = "";
  createGrid();
  startTimer();
}

restartGame();
</script>

</body>
</html>
